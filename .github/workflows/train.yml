name: Train ML Model

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "ml/**"
      - "tests/**"
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/train.yml"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: stock-direction-classifier-actions
      MODEL_REGISTRY_NAME: stock-direction-model

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DISABLE_MLFLOW: "1"
        run: pytest

      - name: Train logistic model
        run: python -m ml.train --model logistic

      - name: Train random forest model
        run: python -m ml.train --model random_forest

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-direction-model
          path: ml/artifacts/stock_direction_model.joblib
          if-no-files-found: error

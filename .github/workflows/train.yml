name: Train ML Model

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "ml/**"
      - "tests/**"
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/train.yml"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: stock-direction-classifier-actions
      MODEL_REGISTRY_NAME: stock-direction-model

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          DISABLE_MLFLOW: "1"
        run: pytest

      - name: Check MLflow tracking server
        run: |
          if [ -z "$MLFLOW_TRACKING_URI" ]; then
            echo "MLFLOW tracking URI is not configured. Training will skip MLflow logging."
            echo "DISABLE_MLFLOW=1" >> "$GITHUB_ENV"
            echo "SKIP_MODEL_PROMOTION=1" >> "$GITHUB_ENV"
            exit 0
          fi

          if curl --fail --silent --show-error --max-time 10 "${MLFLOW_TRACKING_URI%/}/health" > /dev/null; then
            echo "MLflow tracking server is reachable."
          else
            echo "MLflow tracking server is unavailable. Training will skip MLflow logging."
            echo "DISABLE_MLFLOW=1" >> "$GITHUB_ENV"
            echo "SKIP_MODEL_PROMOTION=1" >> "$GITHUB_ENV"
          fi

      - name: Train logistic model
        run: python -m ml.train --model logistic

      - name: Train random forest model
        run: python -m ml.train --model random_forest

      - name: Promote best model
        if: env.SKIP_MODEL_PROMOTION != '1'
        run: python -m ml.model_promoter --metric f1 --alias champion --promote-champion

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-direction-model
          path: ml/artifacts/stock_direction_model.joblib
          if-no-files-found: error

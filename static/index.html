<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stock-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .stock-card:hover {
            transform: translateY(-5px);
        }

        .ticker {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .price {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 5px;
        }

        .change {
            font-size: 1em;
            color: #666;
        }

        .btn-refresh {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-refresh:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 Stock Dashboard</h1>
            <p>미국 주식 실시간 모니터링</p>
            <button class="btn-refresh" onclick="loadStocks()">🔄 새로고침</button>
        </header>

        <div id="loading" class="loading" style="display: none;">로딩 중...</div>
        <div id="stocks" class="stock-grid"></div>
    </div>

    <script>
        async function loadStocks() {
            const stocksDiv = document.getElementById("stocks");
            const loadingDiv = document.getElementById("loading");

            loadingDiv.style.display = "block";
            stocksDiv.innerHTML = "";

            try {
                const response = await fetch("/api/stocks");
                const data = await response.json();

                loadingDiv.style.display = "none";

                data.stocks.forEach(stock => {
                    const card = document.createElement("div");
                    card.className = "stock-card";
                    card.innerHTML = `
                        <div class="ticker">${stock.ticker}</div>
                        <div class="price">$${stock.price.toFixed(2)}</div>
                        <div class="change">변동률: ${stock.change}%</div>
                    `;
                    stocksDiv.appendChild(card);
                });
            } catch (error) {
                loadingDiv.style.display = "none";
                stocksDiv.innerHTML = `<p style="color: red;">오류: ${error.message}</p>`;
            }
        }

        // 페이지 로드 시 자동 실행
        loadStocks();
    </script>
</body>
</html>
